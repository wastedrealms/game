name: Idea / Feedback
description: Suggest an idea or share feedback for Wasted Realms
title: "[Idea] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping shape Wasted Realms! Tell us what would make it better.
  - type: textarea
    id: idea
    attributes:
      label: Your idea or feedback
      description: What would you like to see, change, or improve?
      placeholder: e.g. "Let me queue multiple builds at once"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why does it matter? (optional)
      description: The problem it solves or the experience it improves.
  - type: input
    id: area
    attributes:
      label: Area (optional)
      description: e.g. Map, Build, Combat, Research, UI, Balance
