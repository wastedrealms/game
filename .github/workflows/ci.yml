# Continuous integration — typecheck, test, and build on every push to main and PR.
# Keeps the engine green and the web app building before anything merges/deploys.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Test (engine)
        run: npm test

      - name: Build (engine + web)
        run: npm run build
