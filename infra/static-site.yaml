AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Wasted Realms static site — private S3 bucket + CloudFront (OAC) + DNS-validated
  ACM cert + Route53 alias. Reusable per game/subdomain (game.wastedrealms.com now,
  bunker.wastedrealms.com later). MUST be deployed in us-east-1 (CloudFront requires
  its ACM cert there).

Parameters:
  SiteName:
    Type: String
    Default: wr-game
    Description: Short id used in resource names (e.g. wr-game, wr-bunker).
  Deployment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment target (also tags + names).
  DomainName:
    Type: String
    Default: game.wastedrealms.com
    Description: Fully-qualified subdomain to serve the site at.
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route53 hosted zone id for wastedrealms.com (already exists).
  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues: [PriceClass_100, PriceClass_200, PriceClass_All]
    Description: CloudFront edge coverage (100 = NA/EU, cheapest).
  CertificateArn:
    Type: String
    Default: ""
    Description: >
      Existing ACM cert ARN (us-east-1) to reuse — e.g. the shared wildcard cert for
      wastedrealms.com + *.wastedrealms.com. Leave blank to create a per-domain cert.

Conditions:
  CreateCert: !Equals [!Ref CertificateArn, ""]

Rules:
  RegionMustBeUsEast1:
    Assertions:
      - Assert: !Equals [!Ref "AWS::Region", us-east-1]
        AssertDescription: Deploy this stack in us-east-1 (CloudFront ACM cert requirement).

Resources:
  # Private origin bucket — only CloudFront (via OAC) may read it.
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${SiteName}-${Deployment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - { Key: Project, Value: !Ref SiteName }
        - { Key: Deployment, Value: !Ref Deployment }

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOACRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${SiteName}-${Deployment}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # DNS-validated cert; CloudFormation writes the validation record into the zone,
  # so this auto-validates with no manual step. Only created when no CertificateArn
  # is supplied (otherwise the shared wildcard cert is reused).
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Condition: CreateCert
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${SiteName} (${Deployment}) — ${DomainName}"
        Aliases: [!Ref DomainName]
        DefaultRootObject: index.html
        PriceClass: !Ref PriceClass
        HttpVersion: http2and3
        IPV6Enabled: true
        Origins:
          - Id: s3origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          # Managed-CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        # SPA fallback: serve index.html for client-side paths / missing keys.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        ViewerCertificate:
          AcmCertificateArn: !If [CreateCert, !Ref Certificate, !Ref CertificateArn]
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
      Tags:
        - { Key: Project, Value: !Ref SiteName }
        - { Key: Deployment, Value: !Ref Deployment }

  # game.wastedrealms.com → CloudFront (A + AAAA aliases).
  DnsRecords:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneId: !Ref HostedZoneId
      RecordSets:
        - Name: !Ref DomainName
          Type: A
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2 # fixed CloudFront hosted-zone id
            DNSName: !GetAtt Distribution.DomainName
            EvaluateTargetHealth: false
        - Name: !Ref DomainName
          Type: AAAA
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2
            DNSName: !GetAtt Distribution.DomainName
            EvaluateTargetHealth: false

Outputs:
  BucketName:
    Description: S3 bucket — set as the deploy workflow's S3_BUCKET env var.
    Value: !Ref SiteBucket
  DistributionId:
    Description: CloudFront distribution id — set as CLOUDFRONT_DISTRIBUTION_ID.
    Value: !Ref Distribution
  DistributionDomain:
    Description: CloudFront domain (for testing before DNS propagates).
    Value: !GetAtt Distribution.DomainName
  SiteUrl:
    Value: !Sub "https://${DomainName}"
